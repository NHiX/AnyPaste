name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: linux-x86_64
            os: ubuntu-latest
            bundles: deb,rpm
            artifact_glob: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
          - label: windows-x86_64
            os: windows-latest
            bundles: nsis,msi
            artifact_glob: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
          - label: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
            bundles: dmg
            artifact_glob: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - label: macos-arm64
            os: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg
            artifact_glob: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf rpm

      - name: Install dependencies
        run: npm ci

      - name: Generate icon
        run: npm run icon

      - name: Build frontend
        run: npm run build

      - name: Build Tauri bundles
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            npm run tauri -- build --target "${{ matrix.target }}" --bundles "${{ matrix.bundles }}"
          else
            npm run tauri -- build --bundles "${{ matrix.bundles }}"
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: AnyPaste ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          overwrite_files: true
          files: ${{ matrix.artifact_glob }}
