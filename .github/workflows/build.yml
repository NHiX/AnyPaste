name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tauri:
    name: Tauri (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: npm ci

      - name: Generate icon
        run: npm run icon

      - name: Build frontend
        run: npm run build

      - name: Check Rust
        working-directory: src-tauri
        run: cargo check

      - name: Build Tauri app
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest) npm run tauri -- build --bundles deb,rpm ;;
            windows-latest) npm run tauri -- build --bundles nsis,msi ;;
            macos-latest) npm run tauri -- build --bundles dmg ;;
          esac
